<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GETULIO</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: "Times New Roman", serif;

            background-image: url("sitefundo.png");
            background-size: cover;          
            background-position: center;    
            background-repeat: no-repeat;   
            background-attachment: fixed;   

            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Main area takes up all available space, pushing contact info down naturally */
        #main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-title {
            font-size: clamp(22px, 5vw, 42px); 
            font-style: italic;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .responsive-logo {
            width: 100%;
            max-width: 560px;
            height: auto;
            margin-bottom: 25px;
            max-height: 25vh; 
            object-fit: contain;
        }

        .nav-links a {
            color: #000;
            text-decoration: none;
            font-size: 18px;
            display: inline-block;
            margin: 5px;
        }
        .nav-links a:hover {
            text-decoration: underline;
        }

        .sns-wrap {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }

        .sns-wrap img {
            width: 24px;
            height: 24px;
            object-fit: contain;
            transition: transform 0.2s ease;
        }

        .sns-wrap img:hover {
            transform: scale(1.1);
        }

       
        #contact {
            position: fixed;
            right: 16px;
            bottom: 12px;
            font-size: 14px;
            color: #666;
            text-align: right;
            line-height: 1.35;
            z-index: 10;
        }

        #contact .address {
            margin-top: 4px;
        }

        #background {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        #main,
        #contact {
            position: relative;
            z-index: 1;
        }

        #background video {
            position: absolute;
            width: clamp(120px, 18vw, 260px);
            height: auto;      
            pointer-events: none;
        }

        #background video:nth-child(1) {
            top: 8%;
            left: 6%;
            transform: rotate(-12deg) scale(0.9);
        }

        #background video:nth-child(2) {
            top: 50%;
            right: 8%;
            transform: rotate(18deg) scale(1.2);
        }

        #background video:nth-child(3) {
            bottom: 10%;
            left: 42%;
            transform: rotate(-6deg) scale(0.75);
        }

        
        @media (max-width: 600px) {
            #contact {
                position: static; 
                text-align: center;
                padding-bottom: 20px; 
                font-size: 13px;
            }
        }
    </style>
</head>
<body>




<div id="main">
    <div>
        <div class="main-title">「THE MOST AWESOME WEBSITE EVER」</div>

        <img src="logo.png" class="responsive-logo" alt="u.u">

        <div class="nav-links">
            <a href="https://summersoftget.github.io/about.html">about</a> //
            <a href="https://summersoftget.github.io/blog.html">blog</a> //
            <a href="https://summersoftget.github.io/poems.html">poems</a>//
            <a href="https://www.youtube.com/@getuliotecchio">youtube</a> //
            <a href="https://github.com/summersoftget">github</a>
        </div>

        <div class="sns-wrap">
            <span><a href="http://tiktok.com/@get___o" target="_blank"><img src="https://adoraudition.world/ADR/SNS/20250611_cce3c8ad-ad04-4493-9854-d5866d2cebbe.png" alt="TikTok"></a></span>
            <span><a href="http://instagram.com/getuliotecchio" target="_blank"><img src="https://adoraudition.world/ADR/SNS/20250611_7f55e3a4-3d25-4d81-9ad4-d782b3d250a7.png" alt="Instagram"></a></span>
            <span><a href="http://x.com/getuliao3" target="_blank"><img src="https://adoraudition.world/ADR/SNS/20250611_7f1672fd-e1f1-4952-805e-1ffcc4afae24.png" alt="X (Twitter)"></a></span>
        </div>
    </div>
</div>

<div id="contact">
    <div>getuliotecchio1[at]gmail.com</div>
    <div class="address">
        São Paulo<br>
        Brazil
    </div>
</div>

<div id="background">

    <video autoplay muted loop playsinline>
        <source src="squidward.webm" type="video/webm">
    </video>

    <video autoplay muted loop playsinline>
        <source src="squidward.webm" type="video/webm">
    </video>

    <video autoplay muted loop playsinline>
        <source src="squidward.webm" type="video/webm">
    </video>

</div>

<script>
const videos = document.querySelectorAll("#background video");

videos.forEach(video => {
    video.addEventListener("loadedmetadata", () => {
        video.currentTime = Math.random() * video.duration;
    });
});
</script>

</body>
</html>
